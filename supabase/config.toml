# Configuration minimale pour exécuter les tests de base de données en local
# (`supabase test db`, nécessite Docker). Le projet distant reste géré
# directement via le project_id Supabase (nonqaratfnjpdogjbzyi) ; ce fichier
# ne sert qu'à la stack locale éphémère utilisée pour les tests pgTAP.
project_id = "buildflow"

[db]
port = 54322
