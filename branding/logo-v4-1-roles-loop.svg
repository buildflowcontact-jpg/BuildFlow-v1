<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="r1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="200" height="200" rx="48" fill="url(#r1)"/>

  <!-- Chef de chantier (casque) en haut -->
  <g transform="translate(110,58)">
    <circle cx="0" cy="0" r="14" fill="#ffffff"/>
    <path d="M-14 0 a14 14 0 0 1 28 0 Z" fill="#ffffff"/>
    <rect x="-16" y="-2" width="32" height="5" rx="2.5" fill="url(#r1)"/>
  </g>

  <!-- Client / maison en bas gauche -->
  <g transform="translate(64,150)">
    <path d="M-16 4 L0 -12 L16 4 Z" fill="#ffffff"/>
    <rect x="-11" y="4" width="22" height="14" fill="#ffffff"/>
  </g>

  <!-- Fournisseur / camion en bas droite -->
  <g transform="translate(156,150)">
    <rect x="-16" y="-6" width="22" height="14" rx="2" fill="#ffffff"/>
    <rect x="6" y="0" width="10" height="8" rx="2" fill="#ffffff"/>
    <circle cx="-10" cy="10" r="4" fill="#ffffff"/>
    <circle cx="8" cy="10" r="4" fill="#ffffff"/>
  </g>

  <!-- Flèches de flux reliant les 3 acteurs en boucle -->
  <path d="M98 64 C82 84, 74 108, 68 130" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M62 122 L68 130 L75 121" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <path d="M82 158 C104 158, 128 158, 148 156" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M140 150 L148 156 L139 162" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <path d="M150 132 C140 108, 130 86, 120 66" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M114 73 L120 66 L128 71" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
</svg>
